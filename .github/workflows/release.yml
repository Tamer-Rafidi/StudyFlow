name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact: '*.exe'
          # Disable macOS and Linux until Windows is working
          # - os: macos-latest
          #   platform: mac
          #   artifact: '*.dmg'
          # - os: ubuntu-latest
          #   platform: linux
          #   artifact: '*.{AppImage,deb}'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Python dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build backend
        run: |
          cd backend
          pyinstaller backend.spec
      
      # Verify backend was built
      - name: Verify backend build (Windows)
        if: matrix.platform == 'win'
        run: |
          if (!(Test-Path "backend/dist/backend.exe")) {
            Write-Error "Backend executable not found!"
            exit 1
          }
          Write-Host "Backend executable found"
          Write-Host "Waiting for file handles to release..."
          Start-Sleep -Seconds 5
        shell: pwsh
      
      - name: Copy backend to staging (Windows)
        if: matrix.platform == 'win'
        run: |
          # Create staging directory
          New-Item -ItemType Directory -Force -Path "backend-staging"
          
          # Use robocopy which handles locked files better
          robocopy "backend/dist" "backend-staging" "backend.exe" /COPY:DAT /R:3 /W:2
          
          # robocopy returns 0-7 for success, 8+ for errors
          if ($LASTEXITCODE -ge 8) {
            Write-Error "Failed to copy backend.exe"
            exit 1
          }
          
          Write-Host "Backend copied to staging"
          Start-Sleep -Seconds 2
        shell: pwsh
      
      - name: Verify backend build (Unix)
        if: matrix.platform != 'win'
        run: |
          if [ ! -f "backend/dist/backend" ]; then
            echo "Backend executable not found!"
            exit 1
          fi
          echo "Backend executable found"
          chmod +x backend/dist/backend
      
      - name: Install Node dependencies
        run: npm install
      
      - name: Check build resources
        run: |
          echo "Checking for build resources..."
          mkdir -p build
          # Remove problematic nested icons directory
          rm -rf build/icons/icons 2>/dev/null || true
          # Remove any icon files that might cause issues
          rm -f build/icons/*.icns build/icons/*.ico 2>/dev/null || true
          rm -f *.icns *.ico icon.png 2>/dev/null || true
          echo "Build directory contents:"
          ls -la build/ || true
        shell: bash
      
      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build
      
      - name: Build Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if (Test-Path dist) { Remove-Item -Recurse -Force dist }
          npm run build:${{ matrix.platform }}
        shell: pwsh
      
      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: dist/${{ matrix.artifact }}
          if-no-files-found: warn