name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact: '*.exe'
          # Temporarily disable macOS until icon issue is resolved
          # - os: macos-latest
          #   platform: mac
          #   artifact: '*.dmg'
          - os: ubuntu-latest
            platform: linux
            artifact: '*.{AppImage,deb}'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Python dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build backend
        run: |
          cd backend
          pyinstaller backend.spec
      
      # Verify backend was built
      - name: Verify backend build (Windows)
        if: matrix.platform == 'win'
        run: |
          if (!(Test-Path "backend/dist/backend.exe")) {
            Write-Error "Backend executable not found!"
            exit 1
          }
          Write-Host "Backend executable found"
          # Wait a moment to ensure file handles are released
          Start-Sleep -Seconds 2
        shell: pwsh
      
      - name: Verify backend build (Unix)
        if: matrix.platform != 'win'
        run: |
          if [ ! -f "backend/dist/backend" ]; then
            echo "Backend executable not found!"
            exit 1
          fi
          echo "Backend executable found"
          chmod +x backend/dist/backend
      
      - name: Install Node dependencies
        run: npm install
      
      - name: Check build resources
        run: |
          echo "Checking for build resources..."
          mkdir -p build/icons
          # Remove any existing icon files that might cause issues
          rm -f build/icons/*.icns build/icons/*.ico build/icons/*.png 2>/dev/null || true
          # Remove any icon files in root that electron-builder might find
          rm -f *.icns *.ico icon.png 2>/dev/null || true
          ls -la build/ || true
        shell: bash
      
      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build
      
      - name: Build Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:${{ matrix.platform }}
      
      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: dist/${{ matrix.artifact }}
          if-no-files-found: warn